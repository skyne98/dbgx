roots = ["composer.json", "index.php"]
debug-adapters = ["php-debug"]

[[language]]
name = "haskell"
file-types = ["hs", "lhs"]
roots = ["package.yaml", "*.cabal", "stack.yaml", "cabal.project"]
debug-adapters = ["haskell-debugger"]

[[language]]
name = "ocaml"
file-types = ["ml", "mli"]
roots = ["dune-project", "*.opam"]
debug-adapters = ["ocaml-earlybird"]

[[language]]
name = "perl"
file-types = ["pl", "pm", "t"]
roots = ["cpanfile", "Makefile.PL", "dist.ini"]
debug-adapters = ["perl-debug"]

[[language]]
name = "r"
file-types = ["R", "r", "Rmd"]
roots = ["DESCRIPTION", "*.Rproj"]
debug-adapters = ["r-debugger"]

[[language]]
name = "lua"
file-types = ["lua"]
roots = [".luarc.json", "lua"]
debug-adapters = ["lua-debug"]

[[language]]
name = "gdscript"
file-types = ["gd"]
roots = ["project.godot"]
debug-adapters = ["godot-dap"]

[[language]]
name = "powershell"
file-types = ["ps1", "psm1", "psd1"]
roots = ["*.psd1", "*.sln"]
debug-adapters = ["powershell"]

[[language]]
name = "scala"
file-types = ["scala", "sbt"]
roots = ["build.sbt", "build.sc", "project"]
debug-adapters = ["scala-debug-adapter"]

[[language]]
name = "erlang"
file-types = ["erl", "hrl"]
roots = ["rebar.config", "erlang.mk"]
debug-adapters = []  # erlang-ls archived; whatsapp/edb (erlang-language-platform) is the successor

[[language]]
name = "nim"
file-types = ["nim", "nims"]
roots = ["*.nimble", "nim.cfg"]
debug-adapters = ["lldb-dap", "gdb-dap"]  # Nim compiles to C; debug native binaries
